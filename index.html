<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Lekcyjnik</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 font-sans text-gray-800 min-h-screen">
    <div class="max-w-4xl mx-auto space-y-6">
        
        <h1 class="text-4xl font-bold text-blue-600 text-center mt-4">Twój Lekcyjnik</h1>

        <div class="bg-white p-6 rounded-2xl shadow-lg border border-gray-100">
            <h2 class="font-bold text-xl mb-4 text-gray-700">Dodaj nową lekcję</h2>
            <form id="lesson-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="student" placeholder="Imię ucznia" class="border p-3 rounded-lg bg-gray-50 outline-none focus:border-blue-500" required>
                <input type="text" id="subject" placeholder="Przedmiot" class="border p-3 rounded-lg bg-gray-50 outline-none focus:border-blue-500" required>
                <select id="day" class="border p-3 rounded-lg bg-gray-50 outline-none focus:border-blue-500">
                    <option value="Poniedziałek">Poniedziałek</option>
                    <option value="Wtorek">Wtorek</option>
                    <option value="Środa">Środa</option>
                    <option value="Czwartek">Czwartek</option>
                    <option value="Piątek">Piątek</option>
                </select>
                <input type="time" id="time" class="border p-3 rounded-lg bg-gray-50 outline-none focus:border-blue-500" required>
                <input type="number" id="price" placeholder="Cena (zł)" class="border p-3 rounded-lg bg-gray-50 outline-none focus:border-blue-500" required>
                <button type="submit" class="bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition">Dodaj do kalendarza</button>
            </form>
        </div>

        <div id="lessons-container" class="space-y-6">
            </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
